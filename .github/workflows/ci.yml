name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PNPM
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run reactive-vue tests with coverage
        run: pnpm --filter @silver-formily/reactive-vue test:coverage

      - name: Upload reactive-vue coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: ./packages/reactive-vue/coverage/coverage-final.json
          disable_search: true
          plugins: noop
          flags: reactive-vue
          fail_ci_if_error: true

      - name: Build internal test dependencies
        run: |
          pnpm --filter @silver-formily/grid build
          pnpm --filter @silver-formily/reactive-vue build
          pnpm --filter @silver-formily/vue build

      - name: Install Playwright browsers
        run: pnpm --filter @silver-formily/element-plus exec playwright install --with-deps chromium

      - name: Run element-plus tests with coverage
        run: pnpm --filter @silver-formily/element-plus test:coverage

      - name: Upload element-plus coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: ./packages/element-plus/coverage/coverage-final.json
          disable_search: true
          plugins: noop
          flags: element-plus
          fail_ci_if_error: true
