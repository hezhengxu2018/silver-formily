name: Release

on:
  workflow_dispatch:
    inputs:
      commit_message:
        description: '版本提交信息'
        required: false
        default: 'chore(release): version packages [skip ci]'
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: version-release
  cancel-in-progress: false

jobs:
  version-release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PNPM
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build internal workspace packages
        run: |
          pnpm --filter @silver-formily/grid build
          pnpm --filter @silver-formily/reactive-vue build
          pnpm --filter @silver-formily/vue build
          pnpm --filter @silver-formily/element-plus build

      - name: Run type check
        run: pnpm check-types

      - name: Run unit tests
        run: pnpm test

      - name: Run reactive-vue tests with coverage
        run: pnpm --filter @silver-formily/reactive-vue test:coverage

      - name: Upload reactive-vue coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: ./packages/reactive-vue/coverage/coverage-final.json
          disable_search: true
          plugins: noop
          flags: reactive-vue
          fail_ci_if_error: true

      - name: Install Playwright browsers
        run: pnpm --filter @silver-formily/element-plus exec playwright install --with-deps chromium

      - name: Run grid tests with coverage
        run: pnpm --filter @silver-formily/grid coverage

      - name: Upload grid coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: ./packages/grid/coverage/coverage-final.json
          disable_search: true
          plugins: noop
          flags: grid
          fail_ci_if_error: true

      - name: Run element-plus tests with coverage
        run: pnpm --filter @silver-formily/element-plus test:coverage

      - name: Upload element-plus coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: ./packages/element-plus/coverage/coverage-final.json
          disable_search: true
          plugins: noop
          flags: element-plus
          fail_ci_if_error: true

      - name: Verify NPM token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_TOKEN secret is required for publishing."
            exit 1
          fi

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Version packages
        run: pnpm version-packages

      - name: Commit and push version changes
        id: commit
        env:
          COMMIT_MESSAGE: ${{ inputs.commit_message }}
        run: |
          if git diff --quiet; then
            echo "No version changes generated by changeset version."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add -A
          git commit -m "$COMMIT_MESSAGE" --no-verify
          git push origin HEAD:${GITHUB_REF_NAME}
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Configure npm auth
        if: steps.commit.outputs.has_changes == 'true'
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Release packages
        if: steps.commit.outputs.has_changes == 'true'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm release

      - name: Skip release
        if: steps.commit.outputs.has_changes != 'true'
        run: echo "No version changes detected, release skipped."
