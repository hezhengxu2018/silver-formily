name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PNPM
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build internal test dependencies
        run: |
          pnpm --filter @silver-formily/reactive-vue build
          pnpm --filter @silver-formily/vue build

      - name: Install Playwright browsers
        run: pnpm --filter @silver-formily/element-plus exec playwright install --with-deps chromium

      - name: Run element-plus tests with coverage
        run: pnpm --filter @silver-formily/element-plus test:coverage

      - name: Upload element-plus coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./packages/element-plus/coverage/coverage-final.json
          disable_search: true
          flags: element-plus
          fail_ci_if_error: true

      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build & publish changed packages
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm release
