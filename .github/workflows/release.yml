name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: '是否执行发布（true 才会发布）'
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PNPM
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run reactive-vue tests with coverage
        run: pnpm --filter @silver-formily/reactive-vue test:coverage

      - name: Upload reactive-vue coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: ./packages/reactive-vue/coverage/coverage-final.json
          disable_search: true
          flags: reactive-vue
          fail_ci_if_error: true

      - name: Build internal test dependencies
        run: |
          pnpm --filter @silver-formily/reactive-vue build
          pnpm --filter @silver-formily/vue build

      - name: Install Playwright browsers
        run: pnpm --filter @silver-formily/element-plus exec playwright install --with-deps chromium

      - name: Run element-plus tests with coverage
        run: pnpm --filter @silver-formily/element-plus test:coverage

      - name: Upload element-plus coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: ./packages/element-plus/coverage/coverage-final.json
          disable_search: true
          flags: element-plus
          fail_ci_if_error: true

      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build & publish changed packages
        if: ${{ inputs.publish }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm release

      - name: Skip publish
        if: ${{ !inputs.publish }}
        run: echo "publish=false，本次仅执行校验。"
